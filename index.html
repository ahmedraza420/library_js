<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <title>Library</title>
</head>

<!-- 

    Future You:
    Hey loco! Remember to use BEM naming convention in the next projects.
    Also, UI states (sidebar open/close, theme toggle) should not be handled by using checkboxes.

-->

<body data-theme-dark>

    <template id="card-template">
         <div class="card">
            <img src="" alt="" class="card-image"><!-- onerror="this.src='./images/book-cover-placeholder.png'; this.style.border = '2px solid currentColor'">-->
            <div class="card-description">
                <div class="card-status-wrapper"> 
                        <div class="card-status-display">
                            <div class="status-dropdown">
                                <button class="status-trigger" data-open="false">
                                    <span class="status-text">Status</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" class="more-icon" viewBox="0 -960 960 960" fill="#e8eaed">
                                        <path d="M480-160q-33 0-56.5-23.5T400-240q0-33 23.5-56.5T480-320q33 0 56.5 23.5T560-240q0 33-23.5 56.5T480-160Zm0-240q-33 0-56.5-23.5T400-480q0-33 23.5-56.5T480-560q33 0 56.5 23.5T560-480q0 33-23.5 56.5T480-400Zm0-240q-33 0-56.5-23.5T400-720q0-33 23.5-56.5T480-800q33 0 56.5 23.5T560-720q0 33-23.5 56.5T480-640Z"/>
                                    </svg>
                                </button>
                                <ul class="status-menu">
                                </ul>
                            </div>
                        </div>
                        <button class="card-remove removeCardBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" class="delete-icon" height="20px" viewBox="0 -960 960 960" width="20px" fill="#e8eaed">
                                <path d="M312-144q-29.7 0-50.85-21.15Q240-186.3 240-216v-480h-48v-72h192v-48h192v48h192v72h-48v479.57Q720-186 698.85-165T648-144H312Zm336-552H312v480h336v-480ZM384-288h72v-336h-72v336Zm120 0h72v-336h-72v336ZM312-696v480-480Z"/>
                            </svg>
                        </button>
                </div>
                <h3 class="card-title"></h3>
                <h5 class="card-author"></h5>
                <div class="card-page-date-group">
                    <h6 class="card-pages"></h6>
                    <h6 class="card-published"></h6>
                </div>
                <div class="card-reading">
                        <input type="range" class="card-reading-progress" value="0" min='1' max="">
                        <div class="card-reading-info">
                            <button class="card-page-change-button subPageBtn">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
                                    <path d="m464-480 140 140q18 18 18 44t-18 44q-18 18-44 18t-44-18L333-435q-9-9-14-21t-5-24q0-12 5-24t14-21l183-183q18-18 44-18t44 18q18 18 18 44t-18 44L464-480Z"/>
                                </svg>
                            </button>
                            <h6 class="card-reading-page">Page <span class="card-reading-number">0</span></h6>
                            <button class="card-page-change-button addPageBtn">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="">
                                    <path d="M472-480 332-620q-18-18-18-44t18-44q18-18 44-18t44 18l183 183q9 9 14 21t5 24q0 12-5 24t-14 21L420-252q-18 18-44 18t-44-18q-18-18-18-44t18-44l140-140Z"/>
                                </svg>
                            </button>
                        </div>
                </div>   
            </div>
        </div>
    </template>


    <header class="header">
        <h1 class="header__logo">Library</h1>
        <label class="theme-container">
            <input type="checkbox" name="" id="theme-toggle" class="theme-toggle" checked>
            <div class="icon-circle">
                <div class="icon-circle-inner"></div>
                <div class="icon-crescent"></div>
            </div>
        </label>
        <label class="book-toggle-container" title="Add a New Book" for="book-toggle">
            <svg xmlns="http://www.w3.org/2000/svg" class="book-toggle-icon" viewBox="0 -960 960 960">
                <path d="M417-417H229q-26 0-44.5-18.5T166-480q0-26 18.5-44.5T229-543h188v-188q0-26 18.5-44.5T480-794q26 0 44.5 18.5T543-731v188h188q26 0 44.5 18.5T794-480q0 26-18.5 44.5T731-417H543v188q0 26-18.5 44.5T480-166q-26 0-44.5-18.5T417-229v-188Z"/>
            </svg>
            <h5 class="book-toggle-heading">Add Book</h5>
        </label>
    </header>
    <div class="main-container">
        <span class="noBooks">No Books</span>
        <section class="books-display">
        </section>
        <aside class="sidebar">
            <input type="checkbox" name="" id="book-toggle">
            <div class="form-wrapper">
                <form id="book-form" novalidate>
                    <h2 class="sidebar-heading">Add a New Book</h2>
                    <label for="image-url">
                        <span class="label">Image Url</span>
                        <input type="url" name="image" id="image-url" placeholder="">
                    </label>
                    <label for="title">
                        <span class="label">Title<span aria-hidden="true" class="required">*</span></span>
                        <input type="text" name="title" id="title" placeholder="">
                    </label>
                    <label for="author">
                        <span class="label">Author<span aria-hidden="true" class="required">*</span></span>
                        <input type="text" name="author" id="author" placeholder="">
                    </label>
                    <label for="pages">
                        <span class="label">Number of Pages<span aria-hidden="true" class="required">*</span></span>
                        <input type="number" name="pages" id="pages" min="1" placeholder="">
                    </label>
                    <label for="publish-date">
                        <span class="label">Publication Date<span aria-hidden="true" class="required">*</span></span>
                        <input type="date" name="publishDate" id="publish-date" placeholder="23">
                    </label>
                    <div class="status-container">
                        <span class="status-label">Have you read this book?<span aria-hidden="true" class="required">*</span></span>
                        <label for="not-read">
                            <input type="radio" name="status" id="not-read" value="not read" class="input-radio" checked>
                            <span class="label">Not Read</span>
                        </label>
                        <label for="read">
                            <input type="radio" name="status" id="read" value="read" class="input-radio">
                            <span class="label">Read</span>
                        </label>
                        <label for="reading">
                            <input type="radio" name="status" id="reading" value="reading" class="input-radio">
                            <span class="label">Reading</span>
                        </label>
                    </div>
                    <label for="current-page">
                        <span class="label">Number of Pages Read</span>
                        <input type="number" name="currentPage" id="current-page" placeholder="" value="1" min="1">
                    </label>
                    <span class="error"></span>
                    <button id="submit" type="submit">Add Book</button>
                    <button type="reset" id="form-reset">Reset</button>
                </form>
                <div class="github-container">
                    <!-- source of the icon https://uiverse.io/wilsondesouza/brave-earwig-75 -->
                    <a href="https://github.com/ahmedraza420/library_js" target="_blank" class="github_repo_link" aria-label="GitHub" data-social="github">
                      <div class="filled"></div>
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        style="stroke: none;"
                        fill="currentColor"
                        class="bi bi-github"
                        viewBox="0 0 16 16"
                        xml:space="preserve"
                      >
                        <path
                          d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"
                          fill="currentColor"
                        ></path>
                      </svg>
                    </a>
                    <div class="github-tooltip">GitHub</div>
                </div>
            </div>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
